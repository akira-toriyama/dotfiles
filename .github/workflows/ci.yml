name: ci

on:
  push:
    branches: [rebuild, main]
  pull_request:
    branches: [rebuild, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # nix の評価チェック。--no-build で darwin 固有のビルドはせず eval のみ。
  # Linux runner で十分速く取れる構造検証。
  nix-flake-check:
    name: nix flake check (eval only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix (Determinate)
        uses: DeterminateSystems/nix-installer-action@main

      - name: nix flake check --no-build
        run: nix flake check --no-build --show-trace

  # macOS 実機相当(arm64)で darwin-rebuild build を回し、Determinate Nix 環境で
  # flake が活性化可能かを End-to-end に近い形で証明する。
  # switch はしない(非破壊)。本機の動作は影響を受けない。
  darwin-build:
    name: darwin-rebuild build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix (Determinate)
        uses: DeterminateSystems/nix-installer-action@main

      - name: nix-darwin build (default host alias)
        run: nix run nix-darwin/master#darwin-rebuild -- build --flake .#default --show-trace

  # 実 switch によるスモークテスト。新PCで install.sh を回した時の挙動を
  # macos-latest runner で再現する(masApps だけ App Store サインイン不要のため空)。
  # runner は ephemeral なので副作用 OK。
  darwin-switch-smoke:
    name: darwin-rebuild switch smoke (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix (Determinate)
        uses: DeterminateSystems/nix-installer-action@main

      - name: darwin-rebuild switch (CI variant, masApps 空)
        run: sudo nix run nix-darwin/master#darwin-rebuild -- switch --flake .#ci --show-trace

      - name: Verify CLI on PATH（home.packages 経由）
        # GitHub Actions の step shell は login shell ではないので
        # /etc/zshenv 経由の nix path がロードされない。明示的に追加する。
        run: |
          export PATH="/etc/profiles/per-user/runner/bin:/run/current-system/sw/bin:/nix/var/nix/profiles/default/bin:$PATH"
          for c in docker docker-compose colima op gh chezmoi ghq jq mas; do
            path=$(which "$c" || true)
            if [ -n "$path" ]; then
              echo "  ✓ $c -> $path"
            else
              echo "  ✗ $c (not found)"; exit 1
            fi
          done

      - name: Verify casks installed
        run: |
          set -x
          echo "--- which brew ---"; which brew || true
          echo "--- brew --prefix ---"; brew --prefix || true
          echo "--- brew --version ---"; brew --version || true
          echo "--- brew list --cask ---"
          brew list --cask | tee /tmp/installed_casks.txt | sort
          echo "--- /opt/homebrew/Caskroom/ ---"
          ls /opt/homebrew/Caskroom/ 2>/dev/null | sort | head -30 || true
          echo "--- 期待リストとの照合 ---"
          set +x
          for c in 1password appcleaner azookey fsnotes google-chrome the-unarchiver visual-studio-code vlc popclip alt-tab raycast font-hack-nerd-font flashspace linearmouse omniwm via transmission warp zed; do
            grep -qx "$c" /tmp/installed_casks.txt && echo "  ✓ $c" || echo "  ✗ $c (missing)"
          done
          # 厳格 fail にしない(診断目的)
          true

      - name: chezmoi apply (dot_claude / VSCode 拡張 / 他)
        run: |
          export PATH="/etc/profiles/per-user/runner/bin:/run/current-system/sw/bin:/nix/var/nix/profiles/default/bin:$PATH"
          chezmoi --source ./chezmoi apply --verbose

  # シェルスクリプトの静的解析（install.sh のみ。.tmpl は chezmoi 構文が混ざるので除外）
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run shellcheck on install.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: 'install.sh'
          ignore_paths: 'chezmoi .git'

  # 規約チェック: chezmoi 配下のスクリプトは executable_ 接頭辞を持つこと。
  # 例外: run_* / .chezmoiscripts/ 配下 (chezmoi 自身が実行 = $HOME に展開しない)。
  convention-executable-prefix:
    name: convention / executable_ prefix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check shebang scripts under chezmoi/ have executable_ prefix
        run: |
          set -e
          violations=$(
            find chezmoi -type f \
              \( -name '*.sh' -o -name '*.py' -o -name '*.zsh' -o -name '*.bash' \) \
              -not -path '*/.chezmoiscripts/*' \
              -not -name 'run_*' \
              | while IFS= read -r f; do
                  if head -1 "$f" | grep -q '^#!' \
                     && [[ "$(basename "$f")" != executable_* ]]; then
                    echo "$f"
                  fi
                done
          )
          if [ -n "$violations" ]; then
            echo "::error::shebang script under chezmoi/ without executable_ prefix:"
            echo "$violations" | sed 's/^/  - /'
            exit 1
          fi
          echo "✅ executable_ 規約 OK"

  # chezmoi テンプレートのレンダリング検証（構文エラー早期検出）
  chezmoi-templates:
    name: chezmoi templates render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Render each .tmpl
        # chezmoi の include は --source が指す source dir 起点で解決されるため、
        # repo の chezmoi/ を明示する。
        run: |
          set -e
          failed=0
          while IFS= read -r f; do
            echo "::group::Render $f"
            if ! chezmoi --source ./chezmoi execute-template < "$f" >/dev/null; then
              echo "::error file=$f::template render failed"
              failed=1
            fi
            echo "::endgroup::"
          done < <(find . -path ./.git -prune -o -name '*.tmpl' -print | grep -v '^./.git/')
          exit $failed
