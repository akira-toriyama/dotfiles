name: Verify chord doc sync

# chezmoi/dot_config/chord/private_config.toml を単一ソースとし、
# docs/chord.md のショートカット表がそこから生成された状態と一致するかを検証する。
on:
  # chord 設定 / docs/chord.md / gen-chord-doc.py が変わったときだけ doc 同期を検証。
  # rebuild ブランチは main へ統合済みで、chord ソースは main 上の
  # private_config.toml が単一ソース (PR #108 で .tmpl 廃止)。
  push:
    branches: [main]
    paths:
      - chezmoi/dot_config/chord/private_config.toml
      - docs/chord.md
      - scripts/gen-chord-doc.py
      - .github/workflows/verify-chord-doc.yml
  pull_request:
    branches: [main]
    paths:
      - chezmoi/dot_config/chord/private_config.toml
      - docs/chord.md
      - scripts/gen-chord-doc.py
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Check chord doc is in sync
        run: python3 scripts/gen-chord-doc.py --check
