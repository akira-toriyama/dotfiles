# eventfx + wand 連携: text_selected ランチャー items
#
# wand --show-menu が読み込む standalone items ファイル。各 action-cmd の
# 中で $SELECTION が利用可能 (wand v3.5+ で native trigger からも、PR #28
# 以来 --show-menu からも注入される)。シングルクォートで escape hell 回避。
#
# schema: [[launcher.item]] (wand v4.0+)
# icon : emoji / "SF:<symbol>" / file path のいずれか (wand v4.0 PR #32)

[launcher]
layout = "toolbar"

[[launcher.item]]
name = "Google で検索"
icon = "SF:magnifyingglass"
action-type = "shell"
action-cmd = 'open "https://www.google.com/search?q=$SELECTION"'

[[launcher.item]]
name = "DeepL で翻訳"
icon = "SF:character.bubble"
action-type = "shell"
action-cmd = 'open "https://www.deepl.com/translator#auto/ja/$SELECTION"'

[[launcher.item]]
name = "クリップボードへコピー"
icon = "SF:doc.on.clipboard"
separator-before = true
action-type = "shell"
action-cmd = 'printf "%s" "$SELECTION" | pbcopy'

# ===== glance で結果表示するパイプライン =====================================
# action-cmd 内で transform → "| glance ..." の形。フォーカスを奪わない
# NSPanel に結果が出る。

[[launcher.item]]
name = "Glance で表示 + コピー"
icon = "SF:text.viewfinder"
separator-before = true
action-type = "shell"
# --copy フラグで panel 表示と同時に pbcopy。翻訳結果を後で
# paste したいフローのテンプレ。
# title = 選択元ウィンドウのタイトル ($WAND_TARGET_TITLE)。
# wand v4.x+ では --show-menu が --title CLI flag を受け、
# launcher が $EVENTFX_TITLE をそれで明示注入する (env が IPC で
# 落ちる問題の根本対策)。指定無しでも daemon 側で AX-fetch する
# fallback あり。取得不可は "Selection" にフォールバック。
action-cmd = 'printf "%s" "$SELECTION" | "$HOME/.local/bin/glance" --title "${WAND_TARGET_TITLE:-Selection}" --width 480 --copy'

# DeepL を curl 経由でパイプにすると翻訳結果を panel に出しつつ pbcopy
# できる ($DEEPL_API_KEY 設定済前提)。ブラウザ open 版と置き換える場合:
#
# [[launcher.item]]
# name = "DeepL で翻訳 → 表示 + コピー"
# icon = "SF:character.bubble"
# action-type = "shell"
# action-cmd = 'printf %s "$SELECTION" | curl -s -X POST "https://api-free.deepl.com/v2/translate" -H "Authorization: DeepL-Auth-Key $DEEPL_API_KEY" --data-urlencode "text@-" -d "target_lang=JA" | jq -r ".translations[0].text" | "$HOME/.local/bin/glance" --title "DeepL — ${WAND_TARGET_TITLE:-Selection}" --width 480 --copy'

[[launcher.item]]
name = "文字数・行数"
icon = "SF:textformat.123"
action-type = "shell"
# 注: wand TOML は multi-line literal ''' ''' 非対応 + literal 内で
# 単引用符エスケープ不可。awk の '...' を入れるとパース失敗するため
# wc を使って 1 行 literal に収める。
action-cmd = 'printf "chars: %d\nlines: %d\n" "$(printf %s "$SELECTION" | wc -m | tr -d " ")" "$(printf %s "$SELECTION" | wc -l | tr -d " ")" | "$HOME/.local/bin/glance" --title Count --width 280 --height 140 --auto-close 6'
