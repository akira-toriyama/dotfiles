# -----------------------------------------------------------------
# Global — disable wand entirely for specific bundle ids
# -----------------------------------------------------------------
# v4.0 で [recognition].exclude-apps から移動。空配列 = 何も除外しない。
[exclude]
apps = []


# stroke — ユーザー設定
# https://github.com/akira-toriyama/stroke
#
# このファイルが stroke の設定の **唯一の真実源**。stroke は GUI を
# 持たない。stroke はこのファイルを READ するだけ。範囲外・未知の値は
# 拒否せず黙って安全なデフォルトに clamp される — typo でデーモンが
# 壊れることはない。明示的に検証するなら `stroke --validate`。
#
# 編集はホットリロード対応(保存すると次のジェスチャーから反映)。
# 唯一の例外は `[trigger]` で、ボタン / 修飾キーを変えた時だけ
# 再起動が必要(イベントタップの mask に焼き込まれているため)。
# その場合はデーモンログに restart 警告が出る。


# -----------------------------------------------------------------
# Trigger — どのボタン(+ 任意の修飾キー)でストロークを開始するか
# -----------------------------------------------------------------
[gesture]

# ストロークを開始するマウスボタン。
#   "right"   — 右ボタン(最も一般的)
#   "middle"  — 中ボタン / ホイールクリック
#   "side1"   — 戻るボタン(Mouse Button 4)
#   "side2"   — 進むボタン(Mouse Button 5)
button = "right"

# ボタン押下時に押されていなければならない修飾キー。
# 空 = 修飾キー不要。
# 有効な値: "cmd", "opt", "ctrl", "shift", "fn"
modifiers = []


# -----------------------------------------------------------------
# Recognition — サンプル列をどう方向シーケンスに変換するか
# -----------------------------------------------------------------


# 新しい方向を 1 つ出すのに必要な最小移動量(px)。
# 小さいほど敏感(小さなフリックも拾う)、大きいほど手ブレに寛容。
# 4..200 に clamp。
min-stroke-px = 16

# 1 セグメント(直線区間)の制限時間(ms)。**曲がるたびにリセット**
# されるので全体ではなく方向ごとの予算。複数方向のジェスチャーは各区間に
# フル予算が与えられ、ひとつの方向で止まったまま超過したもの(通常の
# 右ドラッグ)だけ破棄される。0 = 無制限。設定時は 100..60000 に clamp。
max-segment-ms = 1500

# スクリブル・キャンセル: 180° 方向反転がこの回数に達するとジェスチャー
# を破棄(タイムアウト待ち不要)。一般的なジェスチャーは反転しないので、
# 既定 2 で素早い「ぐしゃぐしゃ」だけを取消とみなす。0 = 無効。
# 設定時は 1..20 に clamp。
cancel-reversals = 2

# 上記の反転回数が満たされるべき時間窓(ms)— **素早い**往復だけを
# 取消とみなすための速度ゲート。ゆっくりした往復は別意図の動きと
# みなして発動可能。0 = 速度不問。設定時は 100..5000 に clamp。
cancel-window-ms = 500

# stroke を完全に無効化する Bundle ID — 既にネイティブの
# ジェスチャーを持つアプリ(Xcode、動画編集など)に便利。
# `*` / `?` のグロブ対応。


# -----------------------------------------------------------------
# Overlay — ジェスチャー描画中の HUD(軌跡 + アシスト + バッジ)
# -----------------------------------------------------------------
# どの項目もホットリロード対象。色を変えて保存すれば次のジェスチャー
# から新しい色で描画される。
[gesture.overlay]

# HUD 全体の on/off。off にすると軌跡もアシストカードもバッジも消える
# (デーモン自体は動き続ける)。
enabled = true

# 軌跡の色(マッチ時 / 不一致時)。色は名前("blue", "red", "green",
# "orange", "purple", "pink", "yellow", "white", "black",
# "accent"=システムアクセント)か `#rgb` / `#rrggbb` / `#rrggbbaa`。
color = "#3b82f6"
color-no-match = "#ef4444"

# 軌跡線の太さ(pt)。1..40 に clamp。
width = 3

# ジェスチャー開始位置に出る「対象アプリのアイコン」バッジを表示するか。
# off にしてもアシストカードと軌跡は残る。
badge-enabled = true

# バッジのサイズ(pt)。32..96 に clamp。
badge-size = 56

# HUD 背景に macOS のフロストブラー(NSVisualEffectView)を使うか。
# off で従来の黒ベタ。アクセシビリティ重視や好みで切り替え可能。
blur-enabled = true

# バッジ登場時の小さなスケールイン(0.85→1.0 を 150ms)。off で
# モーション無効。
anim-enabled = true


# -----------------------------------------------------------------
# Effects — アシストカードの退場アニメ
# -----------------------------------------------------------------
# カードは普段、現在の形から到達できなくなった瞬間にパッと消えるだけ。
# 効果を設定するとふわっと退場する。
#   unmatch — ジェスチャー途中で到達不能になったカード
#             (途中で方向を変えて「もう発火しない」と確定した瞬間)
#   match   — ボタン離しで発動したカード(ご褒美演出)
#
# 種類:
#   none           — 即消え(既定)
#   drop           — 下にドロップ
#   rise           — 上に飛んでいく
#   slide-left     — 左に流れる
#   slide-right    — 右に流れる
#   explode        — 拡大しながらフェードアウト
#   vibrate        — 振動してフェード
#   fade           — シンプルなフェードアウト
#   fireworks      — カード下から花火が打ち上がる
#   confetti       — カード上から紙吹雪が降る
#   random         — カードが消えるたびにランダムで 1 つ選ぶ
#
# パーティクル系(fireworks / confetti)は match に置くと一番映える。
[gesture.effect]
unmatch = "random"
match = "random"

# 効果の大きさ — 投げる距離 / パーティクル量に作用。
#   subtle  ≈ 0.6× (控えめ)
#   normal  ≈ 1.0× (既定。基準にチューニング済み)
#   bold    ≈ 1.6× (派手め)
#   wild    ≈ 2.5× (やりすぎ)
intensity = "bold"


# -----------------------------------------------------------------
# Launcher — 中ボタンクリックでカーソル横にコンテキストメニュー
# -----------------------------------------------------------------
# ジェスチャーとは別のもう一つのトリガー。enabled = true で
# 2 つ目の event tap を立ち上げる(ジェスチャーと共存)。
# メニューは macOS ネイティブ NSMenu = サブメニュー / キーボード
# / クリック外で消える、全部 OS 任せ。
#
# ターゲット解決はジェスチャーと同じ「ボタン押下時のカーソル直下
# ウィンドウ」。フォーカスは関係ない。
#
# 再起動が必要な変更 2 つ(tap の event mask に焼き込まれてる):
#   - enabled = false ↔ true の切替
#   - button の変更
# どちらも `stroke --status` の pending-restart に出る。
[launcher]
enabled = true
button = "middle"
modifiers = []

