# -----------------------------------------------------------------
# Rules — 先勝ち。カーソル直下のターゲットに対して適用される
# -----------------------------------------------------------------
# 各 `[[rules]]` ブロックが 1 つの「ジェスチャー → アクション」対応を
# 定義する。ルールは記述順にマッチされ、`pattern` が一致し かつ
# `apps` フィルタがターゲットウィンドウの bundle id を許可する
# 「最初の」ルールが発火する。
#
# パターンのアルファベット:
#   L  = 左(left)    U  = 上(up)
#   R  = 右(right)   D  = 下(down)
# 連結する: "DR" = 下→右、"URD" = 上→右→下。
# **同方向の連打は不可** — 認識器が同じ方向を 1 つに合体させるので、
# `DRR` や `LL` のような繰り返しは描けない。そういうルールは
# `stroke --validate` がロード時に loudly drop する。
#
# 重要 — カーソル基準のマッチング:
#   `apps` は **ストローク開始時にカーソル直下にあるウィンドウ** に
#   対してマッチする(フォーカス中のアプリではない)。だから
#   ディスプレイ 2 の Chrome を指したまま描けば、ディスプレイ 1 で
#   Finder がフォーカスを持っていても常に `*chrome*` に一致する。
#   これが stroke の設計の核心。
#
# `apps` の書き方(正のエントリ + `!`-プレフィクスの除外、大小無視):
#   "*"                   — すべての bundle id にマッチ
#   "com.apple.Safari"    — 完全一致
#   "*chrome*"            — グロブ(`*`, `?`)
#   "!com.apple.dt.Xcode" — 除外(マッチする除外があれば勝つ)
# 「正のいずれかにマッチ(または正自体が無い)かつ `!` のどれにも
#  マッチしない」時に適用。
#
# アクションの形(TOML パーサを最小に保つためキーに分解 —
# インラインテーブルは使わない):
#
#   action-type = "key"    + action-keys = "cmd+w"
#   action-type = "ax"     + action-verb = "close" | "minimize" |
#                                            "zoom" | "raise"
#   action-type = "shell"  + action-cmd  = "open -a Terminal …"
#
# shell アクションにはターゲットを表す環境変数が渡される:
#   STROKE_TARGET_BUNDLE_ID, STROKE_TARGET_PID,
#   STROKE_TARGET_TITLE,     STROKE_TARGET_FRAME (x,y,w,h)
# `STROKE_TARGET_TITLE` は Web ページタイトル等の **untrusted** な
# 文字列が入りうるので、シェルコマンドに展開するときは必ず
# `"$STROKE_TARGET_TITLE"` のようにクオートすること。

# --- ブラウザ(Chrome / Safari)----------------------------------

[[gesture.rule]]
name = "タブを閉じる"
pattern = "DL"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+w"

[[gesture.rule]]
name = "aaa-xxx"
pattern = "DLU"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+w"

[[gesture.rule]]
name = "aaa-2"
pattern = "DLU"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+w"

[[gesture.rule]]
name = "タブを復元"
pattern = "UR"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+shift+t"

[[gesture.rule]]
name = "新しいタブ"
pattern = "DU"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+t"

[[gesture.rule]]
name = "次のタブ"
pattern = "RD"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "ctrl+tab"

[[gesture.rule]]
name = "前のタブ"
pattern = "LD"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "ctrl+shift+tab"

[[gesture.rule]]
name = "再読み込み"
pattern = "UD"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+r"

[[gesture.rule]]
name = "戻る"
pattern = "LU"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+["

[[gesture.rule]]
name = "進む"
pattern = "RU"
apps = ["*chrome*", "*safari*"]
action-type = "key"
action-keys = "cmd+]"


# --- 全アプリ共通 -----------------------------------------------

[[gesture.rule]]
name = "ウィンドウを閉じる"
pattern = "DRU"
apps = ["*"]
action-type = "ax"
action-verb = "close"

[[gesture.rule]]
name = "最小化"
pattern = "L"
apps = ["*"]
action-type = "ax"
action-verb = "minimize"

[[gesture.rule]]
name = "最大化(ズーム)"
pattern = "UL"
apps = ["*"]
action-type = "ax"
action-verb = "zoom"

