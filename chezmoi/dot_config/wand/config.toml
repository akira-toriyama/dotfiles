# --- filter-title / filter-shell smoke test ------------------------
# タイトルに「github.com」が含まれる Chrome タブだけで出る項目。
[[launcher.item]]
name = "GitHub Issue 検索"
icon = "SF:magnifyingglass"
apps = ["*chrome*"]
filter-title = "*github.com*"
separator-before = true
action-type = "url"
action-url = "https://github.com/search?type=issues&q=is:open"

# 22:00 以降だけ出る。filter-shell の挙動チェック用。
[[launcher.item]]
name = "深夜限定リマインダ(22:00-)"
icon = "SF:moon.stars"
filter-shell = "test $(date +%H) -ge 22"
action-type = "shell"
action-cmd  = "afplay /System/Library/Sounds/Glass.aiff"


# --- Dynamic item smoke test ---------------------------------------
# stdout から子メニューを生成。Home の最近編集ファイル top 5。
[[launcher.item]]
name = "Home の最近編集"
icon = "SF:clock"
separator-before = true
dynamic = 'cd ~ && ls -t | head -5'
template-name = "{line}"
template-icon = "SF:doc"
template-action-type = "shell"
template-action-cmd  = 'open ~/"{line}"'

# --- Checkmark / state smoke test ---------------------------------
# `state = "shell:<cmd>"` で menu-open ごとに評価 → exit 0 で ✓ 表示。
# 下は「現在ダークモード?」を OS に問う例。AppleInterfaceStyle が
# "Dark" のときだけ exit 0 になる。
[[launcher.item]]
name = "ダークモード(現在の状態)"
icon = "SF:moon"
separator-before = true
state = "shell:defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark"
action-type = "shell"
action-cmd  = 'osascript -e "tell app \"System Events\" to keystroke \"d\" using {control down, option down, command down}"'

